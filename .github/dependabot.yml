version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "/FileShareAdminClient"
      - "/FileShareClient"
      - "/Tests/UnitTests/*"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      all-packages:
        patterns:
        - "*"
